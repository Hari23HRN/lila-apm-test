<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LILA BLACK – Player Journey Visualizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --border: #252932;
    --accent: #e8c547;
    --accent2: #47b6e8;
    --human: #47e8a0;
    --bot: #e84747;
    --kill: #ff4444;
    --death: #ff8800;
    --loot: #44ddff;
    --storm: #cc44ff;
    --text: #e0e4ef;
    --muted: #7a8499;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* Header */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 18px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  header h1 { font-size: 16px; font-weight: 700; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; }
  header span { color: var(--muted); font-size: 12px; }
  .badge { background: #1e2330; border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-size: 11px; color: var(--muted); }

  /* Layout */
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  .sidebar { width: 300px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
  .sidebar-section { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .sidebar-section label { font-size: 11px; text-transform: uppercase; color: var(--muted); letter-spacing: 0.5px; display: block; margin-bottom: 6px; }
  select, input[type=range] { width: 100%; background: #1a1e28; border: 1px solid var(--border); color: var(--text); border-radius: 4px; padding: 6px 8px; font-size: 13px; }
  select { cursor: pointer; }
  select:focus { outline: none; border-color: var(--accent); }

  .filter-row { display: flex; gap: 8px; }
  .filter-row select { flex: 1; }

  .mode-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
  .mode-tab { flex: 1; padding: 6px; background: #1a1e28; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-size: 12px; text-align: center; color: var(--muted); transition: all 0.15s; }
  .mode-tab.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }

  .heatmap-btns { display: flex; gap: 4px; flex-wrap: wrap; }
  .hm-btn { padding: 4px 8px; border-radius: 3px; font-size: 11px; cursor: pointer; border: 1px solid var(--border); background: #1a1e28; color: var(--muted); transition: all 0.15s; }
  .hm-btn.active { color: #000; font-weight: 600; }
  .hm-btn.kills.active { background: var(--kill); border-color: var(--kill); }
  .hm-btn.storm.active { background: var(--storm); border-color: var(--storm); }
  .hm-btn.traffic.active { background: var(--accent2); border-color: var(--accent2); }
  .hm-btn.off.active { background: var(--muted); border-color: var(--muted); }

  /* Match list */
  .match-list { flex: 1; overflow-y: auto; }
  .match-item { padding: 8px 14px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; flex-direction: column; gap: 3px; transition: background 0.1s; }
  .match-item:hover { background: #1e2330; }
  .match-item.selected { background: #1e2a20; border-left: 3px solid var(--accent); }
  .match-item .match-map { font-size: 12px; color: var(--accent); font-weight: 600; }
  .match-item .match-meta { font-size: 11px; color: var(--muted); display: flex; gap: 8px; }
  .match-item .match-players { font-size: 11px; display: flex; gap: 6px; }
  .match-item .match-players span { display: flex; align-items: center; gap: 3px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .dot.human { background: var(--human); }
  .dot.bot { background: var(--bot); }

  .match-count { padding: 6px 14px; font-size: 11px; color: var(--muted); background: var(--surface); border-bottom: 1px solid var(--border); }

  /* Canvas area */
  .canvas-wrap { flex: 1; position: relative; overflow: hidden; background: #0a0c10; }
  canvas { position: absolute; top: 0; left: 0; }
  #mapCanvas { image-rendering: pixelated; }

  /* Legend */
  .legend { position: absolute; bottom: 12px; left: 12px; background: rgba(13,15,20,0.9); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; font-size: 11px; backdrop-filter: blur(4px); }
  .legend-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .legend-row:last-child { margin-bottom: 0; }
  .legend-line { width: 18px; height: 2px; border-radius: 2px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  .legend-label { color: var(--text); }

  /* Timeline */
  .timeline { position: absolute; bottom: 12px; right: 12px; left: 200px; background: rgba(13,15,20,0.9); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; backdrop-filter: blur(4px); display: none; }
  .timeline label { font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; }
  .timeline input[type=range] { border: none; padding: 2px 0; background: transparent; }
  .tl-controls { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
  .tl-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 4px; padding: 3px 10px; cursor: pointer; font-size: 12px; }
  .tl-btn:hover { background: #1e2330; }
  .tl-btn.playing { border-color: var(--accent); color: var(--accent); }
  #timeLabel { font-size: 11px; color: var(--accent); font-family: monospace; }

  /* Tooltip */
  #tooltip { position: absolute; background: rgba(13,15,20,0.95); border: 1px solid var(--border); border-radius: 5px; padding: 8px 10px; font-size: 12px; pointer-events: none; display: none; max-width: 180px; z-index: 100; }

  /* Stats panel */
  .stats-bar { background: var(--surface); border-top: 1px solid var(--border); padding: 8px 16px; display: flex; gap: 20px; flex-shrink: 0; font-size: 12px; align-items: center; }
  .stat { display: flex; gap: 6px; align-items: center; }
  .stat-label { color: var(--muted); }
  .stat-val { color: var(--text); font-weight: 600; }

  /* Loading */
  .loader { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; background: var(--bg); z-index: 200; }
  .loader-text { color: var(--muted); font-size: 14px; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: var(--surface); } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .no-match { padding: 20px 14px; color: var(--muted); font-size: 13px; text-align: center; }
</style>
</head>
<body>

<header>
  <h1>🎮 LILA BLACK</h1>
  <span>Player Journey Visualizer</span>
  <div class="badge" id="headerStats">Loading data…</div>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">
      <label>View Mode</label>
      <div class="mode-tabs">
        <div class="mode-tab active" data-mode="paths" onclick="setMode('paths')">Paths</div>
        <div class="mode-tab" data-mode="events" onclick="setMode('events')">Events</div>
        <div class="mode-tab" data-mode="heatmap" onclick="setMode('heatmap')">Heatmap</div>
      </div>
      <div id="heatmapControls" style="display:none">
        <label>Layer</label>
        <div class="heatmap-btns">
          <button class="hm-btn kills active" onclick="setHeatmap('kills')">💀 Kills</button>
          <button class="hm-btn storm" onclick="setHeatmap('storm')">🌪 Storm</button>
          <button class="hm-btn traffic" onclick="setHeatmap('traffic')">🔥 Traffic</button>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <label>Filters</label>
      <div class="filter-row">
        <select id="filterMap" onchange="applyFilters()">
          <option value="">All Maps</option>
          <option>AmbroseValley</option>
          <option>GrandRift</option>
          <option>Lockdown</option>
        </select>
        <select id="filterDate" onchange="applyFilters()">
          <option value="">All Dates</option>
          <option>February_10</option>
          <option>February_11</option>
          <option>February_12</option>
          <option>February_13</option>
          <option>February_14</option>
        </select>
      </div>
    </div>

    <div class="match-count" id="matchCount">Loading…</div>
    <div class="match-list" id="matchList">
      <div class="no-match">Loading matches…</div>
    </div>
  </div>

  <!-- CANVAS -->
  <div class="canvas-wrap" id="canvasWrap">
    <div class="loader" id="loader">
      <div class="spinner"></div>
      <div class="loader-text">Loading match data…</div>
    </div>

    <canvas id="mapCanvas"></canvas>
    <canvas id="overlayCanvas"></canvas>

    <div class="legend" id="legend">
      <div class="legend-row"><div class="legend-line" style="background:var(--human)"></div><div class="legend-label">Human path</div></div>
      <div class="legend-row"><div class="legend-line" style="background:var(--bot)"></div><div class="legend-label">Bot path</div></div>
      <div class="legend-row"><div class="legend-dot" style="background:var(--loot)"></div><div class="legend-label">Loot</div></div>
      <div class="legend-row"><div class="legend-dot" style="background:var(--kill)"></div><div class="legend-label">Kill / BotKill</div></div>
      <div class="legend-row"><div class="legend-dot" style="background:var(--death)"></div><div class="legend-label">Death</div></div>
      <div class="legend-row"><div class="legend-dot" style="background:var(--storm)"></div><div class="legend-label">Storm death</div></div>
    </div>

    <div class="timeline" id="timelineBar">
      <label>
        <span>Timeline</span>
        <span id="timeLabel">0:00</span>
      </label>
      <input type="range" id="timeSlider" min="0" max="100" value="0" oninput="onTimeSlider()">
      <div class="tl-controls">
        <button class="tl-btn" id="playBtn" onclick="togglePlay()">▶ Play</button>
        <span style="font-size:11px;color:var(--muted)">Drag to scrub match</span>
      </div>
    </div>

    <div id="tooltip"></div>
  </div>
</div>

<div class="stats-bar" id="statsBar">
  <div class="stat"><span class="stat-label">Map:</span><span class="stat-val" id="statMap">—</span></div>
  <div class="stat"><span class="stat-label">Players:</span><span class="stat-val" id="statPlayers">—</span></div>
  <div class="stat"><span class="stat-label">Bots:</span><span class="stat-val" id="statBots">—</span></div>
  <div class="stat"><span class="stat-label">Events:</span><span class="stat-val" id="statEvents">—</span></div>
  <div class="stat"><span class="stat-label">Match ID:</span><span class="stat-val" id="statMatch" style="font-family:monospace;font-size:10px">—</span></div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let allMatches = [], heatmaps = {}, filteredMatches = [];
let selectedMatch = null;
let mode = 'paths';
let heatmapLayer = 'kills';
let timeValue = 0, playing = false, playTimer = null;

const MAPS = {
  AmbroseValley: { scale: 900, ox: -370, oz: -473, img: 'minimaps/AmbroseValley_Minimap.png' },
  GrandRift:     { scale: 581, ox: -290, oz: -290, img: 'minimaps/GrandRift_Minimap.png' },
  Lockdown:      { scale: 1000, ox: -500, oz: -500, img: 'minimaps/Lockdown_Minimap.jpg' },
};

const EVENT_COLORS = {
  Kill: '#ff4444', Killed: '#ff8800', BotKill: '#ff4444',
  BotKilled: '#ff8800', KilledByStorm: '#cc44ff', Loot: '#44ddff',
};

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  const [matchesResp, heatResp] = await Promise.all([
    fetch('matches.json'), fetch('heatmaps.json')
  ]);
  allMatches = await matchesResp.json();
  heatmaps   = await heatResp.json();

  document.getElementById('headerStats').textContent =
    `${allMatches.length} matches · 5 days · 3 maps`;

  setupCanvas();
  applyFilters();
  document.getElementById('loader').style.display = 'none';
}

// ─── Canvas Setup ─────────────────────────────────────────────────────────────
const mapCanvas = document.getElementById('mapCanvas');
const overlayCanvas = document.getElementById('overlayCanvas');
const mctx = mapCanvas.getContext('2d');
const octx = overlayCanvas.getContext('2d');
let canvasSize = 0;
let mapImages = {};

function setupCanvas() {
  const wrap = document.getElementById('canvasWrap');
  const size = Math.min(wrap.clientWidth, wrap.clientHeight);
  canvasSize = size;
  [mapCanvas, overlayCanvas].forEach(c => {
    c.width = size; c.height = size;
    c.style.width = size + 'px'; c.style.height = size + 'px';
  });
  // Center canvases
  const left = (wrap.clientWidth - size) / 2;
  const top  = (wrap.clientHeight - size) / 2;
  [mapCanvas, overlayCanvas].forEach(c => {
    c.style.left = left + 'px'; c.style.top = top + 'px';
  });
}

window.addEventListener('resize', () => { setupCanvas(); redraw(); });

// ─── Filters ──────────────────────────────────────────────────────────────────
function applyFilters() {
  const map  = document.getElementById('filterMap').value;
  const date = document.getElementById('filterDate').value;
  filteredMatches = allMatches.filter(m =>
    (!map  || m.map  === map) &&
    (!date || m.date === date)
  );
  document.getElementById('matchCount').textContent =
    `${filteredMatches.length} matches`;
  renderMatchList();
}

function renderMatchList() {
  const list = document.getElementById('matchList');
  if (!filteredMatches.length) {
    list.innerHTML = '<div class="no-match">No matches found</div>';
    return;
  }
  list.innerHTML = filteredMatches.map(m => `
    <div class="match-item ${selectedMatch?.id === m.id ? 'selected' : ''}"
         onclick="selectMatch('${m.id}')">
      <div class="match-map">${m.map}</div>
      <div class="match-meta">
        <span>${m.date.replace('February_', 'Feb ')}</span>
        <span>${m.n_events} events</span>
      </div>
      <div class="match-players">
        <span><div class="dot human"></div>${m.n_humans} humans</span>
        <span><div class="dot bot"></div>${m.n_bots} bots</span>
      </div>
    </div>
  `).join('');
}

// ─── Match Selection ──────────────────────────────────────────────────────────
function selectMatch(id) {
  selectedMatch = allMatches.find(m => m.id === id);
  renderMatchList();
  updateStats();
  loadMapImage(selectedMatch.map, () => redraw());
  if (mode === 'paths') {
    document.getElementById('timelineBar').style.display = 'block';
    resetTimeline();
  }
}

function updateStats() {
  if (!selectedMatch) return;
  document.getElementById('statMap').textContent = selectedMatch.map;
  document.getElementById('statPlayers').textContent = selectedMatch.n_humans;
  document.getElementById('statBots').textContent = selectedMatch.n_bots;
  document.getElementById('statEvents').textContent = selectedMatch.events.length;
  document.getElementById('statMatch').textContent = selectedMatch.id.slice(0,18) + '…';
}

// ─── Map image cache ──────────────────────────────────────────────────────────
function loadMapImage(mapId, cb) {
  if (mapImages[mapId]) { cb(); return; }
  const img = new Image();
  img.onload = () => { mapImages[mapId] = img; cb(); };
  img.src = MAPS[mapId].img;
}

// ─── Draw ─────────────────────────────────────────────────────────────────────
function redraw() {
  mctx.clearRect(0, 0, canvasSize, canvasSize);
  octx.clearRect(0, 0, canvasSize, canvasSize);

  if (mode === 'heatmap') {
    drawHeatmap();
    return;
  }

  if (!selectedMatch) {
    drawPlaceholder();
    return;
  }

  const mapId = selectedMatch.map;
  if (mapImages[mapId]) {
    mctx.drawImage(mapImages[mapId], 0, 0, canvasSize, canvasSize);
  }

  if (mode === 'paths') drawPaths();
  else if (mode === 'events') drawEvents();
}

function drawPlaceholder() {
  mctx.fillStyle = '#0f111a';
  mctx.fillRect(0, 0, canvasSize, canvasSize);
  mctx.fillStyle = '#252932';
  mctx.font = '14px Segoe UI';
  mctx.textAlign = 'center';
  mctx.fillText('← Select a match to visualize', canvasSize/2, canvasSize/2);
}

// ─── Paths ────────────────────────────────────────────────────────────────────
function drawPaths() {
  const match = selectedMatch;
  const S = canvasSize / 1024;

  // Determine time range
  let minTs = Infinity, maxTs = -Infinity;
  Object.values(match.paths).forEach(p => {
    p.pts.forEach(([,, t]) => { if(t<minTs) minTs=t; if(t>maxTs) maxTs=t; });
  });
  const cutoff = minTs + (maxTs - minTs) * (timeValue / 100);

  Object.entries(match.paths).forEach(([uid, path]) => {
    const pts = path.pts.filter(([,, t]) => t <= cutoff);
    if (pts.length < 2) return;

    octx.beginPath();
    octx.strokeStyle = path.is_bot ? 'rgba(232,71,71,0.55)' : 'rgba(71,232,160,0.7)';
    octx.lineWidth = path.is_bot ? 1 : 1.5;
    octx.moveTo(pts[0][0]*S, pts[0][1]*S);
    for (let i=1; i<pts.length; i++) octx.lineTo(pts[i][0]*S, pts[i][1]*S);
    octx.stroke();

    // Current position dot
    const last = pts[pts.length-1];
    octx.beginPath();
    octx.arc(last[0]*S, last[1]*S, path.is_bot ? 2.5 : 3.5, 0, Math.PI*2);
    octx.fillStyle = path.is_bot ? '#e84747' : '#47e8a0';
    octx.fill();
  });

  // Draw events up to cutoff
  match.events.forEach(ev => {
    if (ev.ts > cutoff) return;
    drawEventMarker(ev.x*S, ev.y*S, ev.type, 5);
  });
}

// ─── Events only ─────────────────────────────────────────────────────────────
function drawEvents() {
  const S = canvasSize / 1024;
  const match = selectedMatch;

  // Draw faded paths
  Object.values(match.paths).forEach(path => {
    if (path.pts.length < 2) return;
    octx.beginPath();
    octx.strokeStyle = path.is_bot ? 'rgba(232,71,71,0.15)' : 'rgba(71,232,160,0.2)';
    octx.lineWidth = 1;
    octx.moveTo(path.pts[0][0]*S, path.pts[0][1]*S);
    path.pts.forEach(p => octx.lineTo(p[0]*S, p[1]*S));
    octx.stroke();
  });

  match.events.forEach(ev => drawEventMarker(ev.x*S, ev.y*S, ev.type, 6));
}

function drawEventMarker(x, y, type, r=6) {
  const color = EVENT_COLORS[type] || '#ffffff';
  const icons = { Kill:'✖', Killed:'💀', BotKill:'✖', BotKilled:'☠', KilledByStorm:'🌪', Loot:'◆' };
  octx.beginPath();
  octx.arc(x, y, r, 0, Math.PI*2);
  octx.fillStyle = color + 'cc';
  octx.fill();
  octx.strokeStyle = color;
  octx.lineWidth = 1;
  octx.stroke();
}

// ─── Heatmap ──────────────────────────────────────────────────────────────────
function drawHeatmap() {
  const mapId = document.getElementById('filterMap').value || 'AmbroseValley';
  if (mapImages[mapId]) {
    mctx.globalAlpha = 0.5;
    mctx.drawImage(mapImages[mapId], 0, 0, canvasSize, canvasSize);
    mctx.globalAlpha = 1;
  } else {
    mctx.fillStyle = '#0f111a';
    mctx.fillRect(0, 0, canvasSize, canvasSize);
    loadMapImage(mapId, () => redraw());
  }

  const grid = heatmaps[mapId]?.[heatmapLayer];
  if (!grid) return;

  const GRID = grid.length;
  const cell = canvasSize / GRID;
  const maxVal = Math.max(...grid.flat());
  if (maxVal === 0) return;

  const colors = {
    kills:   [255, 50, 50],
    storm:   [180, 50, 255],
    traffic: [50, 180, 255],
  };
  const [r,g,b] = colors[heatmapLayer] || [255,255,255];

  for (let gy=0; gy<GRID; gy++) {
    for (let gx=0; gx<GRID; gx++) {
      const v = grid[gy][gx];
      if (v === 0) continue;
      const alpha = Math.min(0.85, (v / maxVal) ** 0.45 * 0.85);
      octx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
      octx.fillRect(gx*cell, gy*cell, cell+1, cell+1);
    }
  }
}

// ─── Timeline ─────────────────────────────────────────────────────────────────
function onTimeSlider() {
  timeValue = parseInt(document.getElementById('timeSlider').value);
  updateTimeLabel();
  redraw();
}

function updateTimeLabel() {
  if (!selectedMatch) return;
  let minTs = Infinity, maxTs = -Infinity;
  Object.values(selectedMatch.paths).forEach(p =>
    p.pts.forEach(([,, t]) => { if(t<minTs) minTs=t; if(t>maxTs) maxTs=t; })
  );
  const cur = minTs + (maxTs - minTs) * (timeValue / 100);
  const elapsed = Math.round((cur - minTs) / 1000);
  const m = Math.floor(elapsed/60), s = elapsed%60;
  document.getElementById('timeLabel').textContent =
    `${m}:${String(s).padStart(2,'0')}`;
}

function resetTimeline() {
  timeValue = 0;
  document.getElementById('timeSlider').value = 0;
  updateTimeLabel();
  stopPlay();
  redraw();
}

function togglePlay() {
  if (playing) stopPlay(); else startPlay();
}

function startPlay() {
  playing = true;
  document.getElementById('playBtn').textContent = '⏸ Pause';
  document.getElementById('playBtn').classList.add('playing');
  playTimer = setInterval(() => {
    timeValue = Math.min(100, timeValue + 0.5);
    document.getElementById('timeSlider').value = timeValue;
    updateTimeLabel();
    redraw();
    if (timeValue >= 100) stopPlay();
  }, 50);
}

function stopPlay() {
  playing = false;
  clearInterval(playTimer);
  document.getElementById('playBtn').textContent = '▶ Play';
  document.getElementById('playBtn').classList.remove('playing');
}

// ─── Mode switching ───────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.mode === m));
  document.getElementById('heatmapControls').style.display =
    m === 'heatmap' ? 'block' : 'none';
  document.getElementById('timelineBar').style.display =
    (m === 'paths' && selectedMatch) ? 'block' : 'none';
  document.getElementById('legend').style.display =
    m === 'heatmap' ? 'none' : 'block';
  if (m === 'heatmap') stopPlay();
  redraw();
}

function setHeatmap(layer) {
  heatmapLayer = layer;
  document.querySelectorAll('.hm-btn').forEach(b =>
    b.classList.toggle('active', b.classList.contains(layer)));
  redraw();
}

// ─── Tooltip ──────────────────────────────────────────────────────────────────
overlayCanvas.addEventListener('mousemove', (e) => {
  if (!selectedMatch || mode === 'heatmap') {
    document.getElementById('tooltip').style.display = 'none';
    return;
  }
  const rect = overlayCanvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const S = canvasSize / 1024;

  let found = null;
  for (const ev of selectedMatch.events) {
    const dx = ev.x*S - mx, dy = ev.y*S - my;
    if (Math.sqrt(dx*dx+dy*dy) < 10) { found = ev; break; }
  }

  const tip = document.getElementById('tooltip');
  if (found) {
    tip.innerHTML = `<b>${found.type}</b><br>${found.is_bot ? '🤖 Bot' : '👤 Human'}<br>ID: ${String(found.user_id).slice(0,8)}`;
    tip.style.display = 'block';
    tip.style.left = (e.clientX + 12) + 'px';
    tip.style.top  = (e.clientY - 10) + 'px';
  } else {
    tip.style.display = 'none';
  }
});

overlayCanvas.addEventListener('mouseleave', () => {
  document.getElementById('tooltip').style.display = 'none';
});

// ─── Boot ─────────────────────────────────────────────────────────────────────
init().then(() => {
  // Auto-select first match
  if (filteredMatches.length) selectMatch(filteredMatches[0].id);
});
</script>
